<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ICU-AW 日次入力・主要指標ビューア</title>
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="theme-color" content="#0f766e" />
<style>
:root {
  --bg:#f5f7fb; --panel:#ffffff; --ink:#162033; --muted:#61708a; --line:#d9e0ea;
  --header:#0f766e; --header2:#115e59; --input:#fff6bf; --calc:#e7f5df; --judge:#eef2f7;
  --red:#dc2626; --yellow:#b7791f; --green:#15803d; --blue:#2563eb;
}
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Meiryo,sans-serif; }
.appbar { position:sticky; top:0; z-index:20; background:linear-gradient(90deg,var(--header),var(--header2)); color:#fff; padding:14px 18px; box-shadow:0 2px 10px rgba(0,0,0,.14); }
.appbar h1 { margin:0; font-size:18px; font-weight:700; }
.appbar p { margin:4px 0 0; color:#dff7f2; font-size:12px; }
.toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; padding:12px 18px; background:#fff; border-bottom:1px solid var(--line); position:sticky; top:70px; z-index:19; }
.tab { border:1px solid var(--line); background:#f8fafc; color:var(--ink); padding:10px 14px; border-radius:7px; cursor:pointer; font-weight:650; font-size:14px; }
.tab.active { background:var(--header); color:#fff; border-color:var(--header); }
button.action { border:1px solid #b6c2d2; background:#fff; padding:10px 13px; border-radius:7px; cursor:pointer; font-size:14px; }
button.action.primary { background:var(--header); border-color:var(--header); color:#fff; font-weight:700; }
.mobile-day-control { display:none; align-items:center; gap:6px; color:#334155; font-size:13px; font-weight:650; }
.mobile-day-control select { border:1px solid #b6c2d2; border-radius:7px; padding:8px 10px; font:inherit; background:#fff; }
.status { margin-left:auto; color:var(--muted); font-size:12px; }
main { padding:18px; }
.sheet { display:none; }
.sheet.active { display:block; }
.panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden; box-shadow:0 1px 4px rgba(15,23,42,.05); }
.sheet-title { padding:14px 16px; border-bottom:1px solid var(--line); background:#fbfdff; }
.sheet-title h2 { margin:0; font-size:17px; }
.sheet-title p { margin:5px 0 0; color:var(--muted); font-size:12px; }
.table-wrap { overflow:auto; max-height:calc(100vh - 190px); }
table { border-collapse:collapse; width:max-content; min-width:100%; font-size:13px; }
th, td { border:1px solid var(--line); padding:7px 7px; min-width:74px; height:34px; vertical-align:middle; }
th { position:sticky; top:0; z-index:5; background:var(--header); color:#fff; font-weight:700; }
th.meta, td.meta { min-width:130px; max-width:240px; white-space:normal; }
td.category { min-width:102px; font-weight:650; color:#29445e; background:#f3f7fb; }
td.standard { min-width:230px; color:#46566f; }
td.day { text-align:right; }
td.input { background:var(--input); }
td.calc { background:var(--calc); font-weight:650; }
td.judge { background:var(--judge); }
td.note { min-width:260px; color:#46566f; }
input.cell, select.cell { width:74px; border:0; background:transparent; text-align:right; font:inherit; font-size:15px; font-weight:650; color:inherit; outline:1px solid transparent; padding:5px 4px; }
input.cell:focus, select.cell:focus { outline:2px solid #0ea5e9; background:#fff; border-radius:3px; }
.text-cell input.cell, .text-cell select.cell { text-align:left; width:96px; }
.badge { display:inline-block; border-radius:999px; padding:4px 10px; font-weight:700; color:#fff; font-size:13px; }
.badge.Green { background:var(--green); } .badge.Yellow { background:var(--yellow); } .badge.Red { background:var(--red); }
.formula-tip { color:#334155; cursor:help; }
.dashboard { display:grid; grid-template-columns:repeat(4,minmax(160px,1fr)); gap:12px; margin-bottom:16px; }
.kpi { background:#fff; border:1px solid var(--line); border-radius:8px; padding:12px; }
.kpi .label { color:var(--muted); font-size:12px; } .kpi .value { font-size:24px; font-weight:800; margin-top:4px; }
.charts { display:grid; grid-template-columns:1fr; gap:14px; margin-top:16px; }
.chart-card { background:#fff; border:1px solid var(--line); border-radius:8px; padding:12px; }
.chart-card h3 { margin:0 0 8px; font-size:15px; }
canvas { width:100%; height:310px; display:block; }
.mini-chart-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:10px; }
.mini-chart { border:1px solid var(--line); border-radius:8px; padding:8px; background:#fff; }
.mini-chart h4 { margin:0 0 4px; font-size:12px; color:#334155; }
.mini-chart canvas { height:130px; }
.spark { width:86px; height:24px; display:block; }
.legend { display:flex; flex-wrap:wrap; gap:8px 14px; font-size:12px; color:#475569; margin-top:8px; }
.legend span::before { content:""; display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--c); margin-right:5px; }
.print-preview { display:none; }
.print-actions { display:flex; gap:10px; justify-content:flex-end; padding:12px 0; }
.day-report { background:#fff; color:#111827; padding:20px; max-width:780px; margin:0 auto; }
.day-report h1 { margin:0; font-size:22px; }
.day-report .subtitle { color:#475569; margin:5px 0 14px; }
.report-kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:12px 0; }
.report-kpi { border:1px solid #cbd5e1; padding:9px; border-radius:6px; }
.report-kpi .label { color:#64748b; font-size:11px; }
.report-kpi .value { font-size:18px; font-weight:800; margin-top:3px; }
.report-section { margin-top:14px; }
.report-section h2 { font-size:15px; margin:0 0 6px; border-bottom:2px solid #0f766e; padding-bottom:4px; }
.report-table { width:100%; border-collapse:collapse; font-size:11px; }
.report-table th, .report-table td { border:1px solid #cbd5e1; padding:5px 6px; min-width:0; height:auto; text-align:left; }
.report-table th { background:#e6f4f1; color:#111827; position:static; }
.report-table td.value { text-align:right; font-weight:650; }
.graph-report { max-width:1040px; }
.graph-report canvas { height:250px; border:1px solid #cbd5e1; border-radius:6px; margin:4px 0 10px; }
.graph-report .mini-chart-grid { grid-template-columns:repeat(3,1fr); }
.graph-report .mini-chart canvas { height:115px; border:0; margin:0; }
.graph-report .report-table { font-size:10px; }
.graph-report .report-table th, .graph-report .report-table td { padding:4px; text-align:right; }
.graph-report .report-table th:first-child, .graph-report .report-table th:nth-child(2), .graph-report .report-table td:first-child, .graph-report .report-table td:nth-child(2), .graph-report .report-table td:last-child { text-align:left; }
@media (max-width: 760px) {
  .appbar { padding:10px 12px; }
  .appbar h1 { font-size:16px; }
  .appbar p { display:none; }
  .toolbar { top:50px; padding:8px 10px; gap:7px; }
  .tab, button.action { padding:11px 12px; font-size:14px; }
  .mobile-day-control { display:flex; }
  .status { flex-basis:100%; margin-left:0; }
  main { padding:8px; }
  .dashboard { grid-template-columns:1fr 1fr; }
  .table-wrap { max-height:none; }
  table { min-width:0; width:100%; font-size:13px; }
  th, td { min-width:58px; padding:7px 5px; height:38px; }
  th.meta, td.meta { min-width:102px; max-width:140px; }
  td.category { min-width:84px; }
  td.standard { min-width:120px; }
  .desktop-day { display:none; }
  input.cell, select.cell { width:100%; min-width:72px; min-height:40px; text-align:left; font-size:16px; }
  .text-cell input.cell, .text-cell select.cell { width:100%; }
  canvas { height:240px; }
  .mini-chart-grid { grid-template-columns:1fr; }
  .report-kpis { grid-template-columns:1fr 1fr; }
  .print-actions { position:sticky; top:0; background:#fff; z-index:30; }
}
@media print {
  @page { size:A4 portrait; margin:10mm; }
  body { background:#fff; }
  .appbar, .toolbar, main > .sheet, .print-actions { display:none !important; }
  main { padding:0; }
  .print-preview { display:block !important; }
  .day-report { padding:0; max-width:none; }
}
</style>
</head>

  if (r===30) { const a=num(29,d); return a==='' ? '' : 28.7*a-46.7; }
  if (r===32) { const a=num(31,d), b=val(30,d); return (a===''||isBlank(b)) ? '' : a/b; }
  if (r===62) return micro(d);
  if (r===63) return catabolic(d);
  if (r===64) return insulinRisk(d);
  if (r===65) return metabolic(d);
  if (r===66) return coag(d);
  if (r===67) return muscle(d);
  if (r===68) return redFlags(d);
  if (r===69) return [62,63,64,65,66,67].reduce((s,r)=>s+n(val(r,d)),0);
  if (r===70) return val(68,d)>=1 ? 'Red' : (val(69,d)>=7 ? 'Red' : (val(69,d)>=3 ? 'Yellow' : 'Green'));
  if (r===71) return val(70,d)==='Red' ? '体位管理・ROM中心／負荷増量しない' : (val(70,d)==='Yellow' ? '低〜中負荷・短時間・反応確認' : '段階的増量');
  if (r===74) return redReasons(d);
  if (r===75) return riskReasons(d);
  return '';
}
function micro(d) { return (ge(47,d,2)?1:0)+(lt(54,d,0.5)?1:0)+(gt(55,d,3)?1:0)+(lt(51,d,65)?1:0)+(lt(49,d,300)?1:0)+(raw(53,d)==='増量'?1:0)+(raw(56,d)==='有'?1:0)+(raw(57,d)==='有'?1:0); }
function catabolic(d) { return (gtVal(val(20,d),20)?1:0)+(gt(18,d,20)?1:0)+(ge(38,d,10)?1:0)+(lt(17,d,3)?1:0)+(raw(23,d)==='有'?1:0)+(d>0 && !isBlank(val(26,d)) && !isBlank(val(26,d-1)) && val(26,d)>val(26,d-1)*1.2 ? 1:0); }
function insulinRisk(d) { return (raw(23,d)==='有'?1:0)+(gtVal(val(32,d),1.2)?1:0)+(d>0 && !isBlank(val(26,d)) && !isBlank(val(26,d-1)) && val(26,d)>val(26,d-1)*1.2 ? 1:0)+(ge(22,d,180)?1:0); }
function metabolic(d) { return (betweenBad(22,d,70,179.999)?1:0)+(betweenBad(41,d,7.35,7.45)?1:0)+(lt(45,d,-3)?1:0)+(betweenBad(34,d,3.5,5.1)?1:0)+(lt(37,d,2.7)?1:0)+(lt(39,d,1.8)?1:0); }
function coag(d) { return (lt(12,d,10)?1:0)+(gt(13,d,1.5)?1:0)+(gt(14,d,50)?1:0)+(lt(15,d,150)?1:0)+(gt(16,d,10)?1:0); }
function muscle(d) { return (gt(21,d,1000)?1:0)+(lt(58,d,48)?1:0); }
function redFlags(d) { return (ge(47,d,5)?1:0)+(le(41,d,7.2)?1:0)+(lt(51,d,60)?1:0)+(lt(12,d,3)?1:0)+(ge(21,d,5000)?1:0)+(betweenBad(34,d,3,6)?1:0)+(lt(22,d,70)?1:0)+(ge(18,d,80)?1:0)+(raw(53,d)==='増量'?1:0)+(raw(56,d)==='有'?1:0); }
function gtVal(v,t) { return !isBlank(v) && Number(v)>t; }
function redReasons(d) { if (val(70,d)!=='Red') return ''; const a=[]; if(ge(47,d,5))a.push('乳酸≥5'); if(le(41,d,7.2))a.push('pH≤7.2'); if(lt(51,d,60))a.push('MAP<60'); if(lt(12,d,3))a.push('血小板<3万'); if(ge(21,d,5000))a.push('CK≥5000'); if(betweenBad(34,d,3,6))a.push('K<3.0または>6.0'); if(lt(22,d,70))a.push('低血糖<70'); if(ge(18,d,80))a.push('BUN≥80'); if(raw(53,d)==='増量')a.push('昇圧薬増量'); if(raw(56,d)==='有')a.push('mottling有'); if(val(69,d)>=7)a.push('総合点≥7'); return a.join('、'); }
function riskReasons(d) { if (val(69,d)===0) return 'リスク加点なし'; const a=[]; [[62,'微小循環'],[63,'異化'],[64,'インスリン抵抗性'],[65,'代謝/電解質'],[66,'凝固'],[67,'筋損傷/ICU-AW']].forEach(([r,label])=>{ if(val(r,d)>0)a.push(`${label} ${val(r,d)}点`); }); return a.join('、'); }
function formulaFor(row, day) { const item = DATA.dailyRows.find(r=>r.r===row); return item?.days?.[day]?.f || ''; }
function isTextRow(r) { return [6,8,23,53,56,57,60,61,72,73].includes(r); }
function dropdownOptions(r) {
 if (r===23 || r===56 || r===57) return ['','無','有'];
 if (r===53) return ['','なし','減量','不変','増量'];
 if (r===72) return ['','I 関節可動域訓練','II 体位ドレナージ','III ギャッチアップ30°','IV ギャッチアップ60°','V 端坐位','VI 立位・足踏み','VII 歩行'];
 if (r===73) return ['','Passive','Active-assistive','Active','Resistance'];
 return null;
}

function drawLineChart(canvas, series, legendId) {
 if (!canvas) return;
 const ratio=window.devicePixelRatio||1; const rect=canvas.getBoundingClientRect(); canvas.width=rect.width*ratio; canvas.height=rect.height*ratio; const ctx=canvas.getContext('2d'); ctx.scale(ratio,ratio);
 const w=rect.width,h=rect.height,p={l:44,r:16,t:18,b:34}; ctx.clearRect(0,0,w,h); ctx.font='12px sans-serif';
 const all=series.flatMap(s=>s.values).filter(v=>!isBlank(v)).map(Number); const min=all.length?Math.min(0,...all):0; const max=all.length?Math.max(...all):1; const span=max-min||1;
 ctx.strokeStyle='#d9e0ea'; ctx.lineWidth=1; ctx.fillStyle='#64748b';
 for(let i=0;i<=4;i++){ const y=p.t+(h-p.t-p.b)*i/4; ctx.beginPath(); ctx.moveTo(p.l,y); ctx.lineTo(w-p.r,y); ctx.stroke(); const val=max-span*i/4; ctx.fillText(fmt(val),6,y+4); }
 DAYS.forEach((d,i)=>{ const x=p.l+(w-p.l-p.r)*i/13; if(i%2===0) ctx.fillText('D'+d,x-8,h-10); });
 series.forEach(s=>{ ctx.strokeStyle=s.color; ctx.lineWidth=2; ctx.beginPath(); let started=false; s.values.forEach((v,i)=>{ if(isBlank(v)) return; const x=p.l+(w-p.l-p.r)*i/13; const y=p.t+(h-p.t-p.b)*(1-(Number(v)-min)/span); if(!started){ctx.moveTo(x,y); started=true;} else ctx.lineTo(x,y); }); ctx.stroke(); });
 if (legendId) document.getElementById(legendId).innerHTML=series.map(s=>`<span style="--c:${s.color}">${escapeHtml(s.name)}</span>`).join('');
}
